<!-- Umami Analytics -->
<script>
  (function() {
    var url = "SUA_URL_DO_UMAMI_AQUI"; // Ex: https://umami.neovertexia.com
    var websiteId = "SEU_WEBSITE_ID_AQUI"; // Ex: 9b2d8e4f-7c1a-4d3b-8f5c-2a6d7e8f9c0b
    
    // Tenta carregar do localStorage caso as variáveis do HTML ainda sejam placeholders
    if (url.indexOf("SUA_URL_DO_UMAMI_AQUI") !== -1 || websiteId.indexOf("SEU_WEBSITE_ID_AQUI") !== -1) {
      try {
        var localConfig = JSON.parse(localStorage.getItem('nv-umami-config-v1'));
        if (localConfig && localConfig.url && localConfig.websiteId) {
          url = localConfig.url;
          websiteId = localConfig.websiteId;
        }
      } catch (e) {}
    }
    
    if (url && websiteId && url.indexOf("SUA_URL_DO_UMAMI_AQUI") === -1 && websiteId.indexOf("SEU_WEBSITE_ID_AQUI") === -1) {
      var script = document.createElement('script');
      script.async = true;
      script.defer = true;
      script.src = url + (url.endsWith('/') ? '' : '/') + 'script.js';
      script.setAttribute('data-website-id', websiteId);
      document.head.appendChild(script);
    }
  })();
</script>
</head>
<body>
<div id="root"></div>
<div id="admin-root"></div>
