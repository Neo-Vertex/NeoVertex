<!doctype html>
<html lang="pt-BR">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1"/>
<title>NeoVertex — Logo Studio</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&family=JetBrains+Mono:wght@400;500;600&family=Space+Grotesk:wght@500;700&display=swap" rel="stylesheet"/>
<style>
  :root {
    --bg-deep: #1E1F29;
    --bg: #282A36;
    --fg: #F8F8F2;
    --fg-muted: rgba(248,248,242,0.62);
    --comment: #6272A4;
    --green: #50FA7B;
    --purple: #BD93F9;
    --cyan: #8BE9FD;
    --grad: linear-gradient(135deg, #50FA7B, #BD93F9);
    --font-sans: 'Inter', sans-serif;
    --font-mono: 'JetBrains Mono', monospace;
    --font-display: 'Space Grotesk', sans-serif;
  }
  body { background: var(--bg-deep); color: var(--fg); font-family: var(--font-sans); margin: 0; }
  .lab {
    width: 100%; height: 100%;
    background: var(--bg);
    border-radius: 16px;
    display: flex;
    align-items: center;
    justify-content: center;
    position: relative;
    overflow: hidden;
  }
  .lab.light { background: #F8F8F2; }
  .lab .nameplate {
    position: absolute; bottom: 16px; left: 16px;
    font-family: var(--font-mono);
    font-size: 11px;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    color: var(--comment);
  }
  .lab .swatch-row {
    position: absolute; bottom: 16px; right: 16px;
    display: flex; gap: 4px;
  }
  .lab .swatch-row span { width: 14px; height: 14px; border-radius: 50%; }
</style>
</head>
<body>
<div id="root"></div>

<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

<script type="text/babel" src="design-canvas.jsx"></script>
<script type="text/babel">
const { useState } = React;

/* ──────────────────────────────────────────────────────────
   LOGO OPTIONS — 6 directions
   Each comes in: 256×256 mark, 480×140 lockup (mark + wordmark),
   plus a small variation context.
   ────────────────────────────────────────────────────────── */

/* shared gradient defs */
const Gradients = ({ id = 'g' }) => (
  <defs>
    <linearGradient id={`${id}-grad`} x1="0" y1="1" x2="1" y2="0">
      <stop offset="0%" stopColor="#50FA7B"/>
      <stop offset="100%" stopColor="#BD93F9"/>
    </linearGradient>
    <linearGradient id={`${id}-grad2`} x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stopColor="#8BE9FD"/>
      <stop offset="100%" stopColor="#BD93F9"/>
    </linearGradient>
  </defs>
);

/* ===== Option 1: Peak Monogram — N stroke that becomes a summit ===== */
function Peak({ size = 200, mono = false }) {
  const fill = mono ? 'currentColor' : 'url(#peak-grad)';
  return (
    <svg width={size} height={size} viewBox="0 0 100 100" fill="none">
      <Gradients id="peak"/>
      {/* outer rounded square */}
      <rect x="6" y="6" width="88" height="88" rx="22" fill={fill}/>
      {/* the N as 3 negative-space strokes that visually form a peak */}
      <g fill={mono ? 'var(--bg)' : '#15161E'}>
        <path d="M28 76 L28 24 L36 24 L36 60 Z"/>
        <path d="M64 76 L64 40 L72 40 L72 76 Z"/>
        <path d="M36 24 L72 76 L64 76 L34 32 Z"/>
        {/* summit triangle dot */}
        <path d="M50 32 L56 22 L62 32 Z" opacity=".85"/>
      </g>
    </svg>
  );
}

/* ===== Option 2: Vertex Triangle — pure geometric, "vertex" as math term ===== */
function Vertex({ size = 200 }) {
  return (
    <svg width={size} height={size} viewBox="0 0 100 100" fill="none">
      <Gradients id="vx"/>
      {/* three concentric triangles in declining opacity */}
      <path d="M50 14 L86 78 L14 78 Z" stroke="url(#vx-grad)" strokeWidth="3" strokeLinejoin="round" opacity=".25"/>
      <path d="M50 28 L74 70 L26 70 Z" stroke="url(#vx-grad)" strokeWidth="3" strokeLinejoin="round" opacity=".55"/>
      <path d="M50 42 L62 62 L38 62 Z" fill="url(#vx-grad)"/>
      {/* small N marker at the bottom */}
      <text x="50" y="93" textAnchor="middle"
            fontFamily="'JetBrains Mono'" fontSize="8" fontWeight="600"
            fill="#F8F8F2" letterSpacing="0.18em">NV</text>
    </svg>
  );
}

/* ===== Option 3: Topographic — concentric peak contours ===== */
function Topo({ size = 200 }) {
  return (
    <svg width={size} height={size} viewBox="0 0 100 100" fill="none">
      <Gradients id="topo"/>
      <circle cx="50" cy="50" r="46" fill="#1E1F29" stroke="url(#topo-grad)" strokeWidth="1.2" opacity=".4"/>
      {/* topographic contour lines forming a peak when seen together */}
      <g stroke="url(#topo-grad)" strokeWidth="1.6" fill="none" strokeLinecap="round" strokeLinejoin="round">
        <path d="M22 72 Q35 64 50 64 T78 72" opacity=".35"/>
        <path d="M26 62 Q38 52 50 52 T74 62" opacity=".5"/>
        <path d="M30 52 Q40 42 50 42 T70 52" opacity=".7"/>
        <path d="M34 42 Q42 34 50 34 T66 42" opacity=".9"/>
        <path d="M38 32 Q44 26 50 26 T62 32"/>
      </g>
      {/* summit dot */}
      <circle cx="50" cy="22" r="3.4" fill="url(#topo-grad)"/>
    </svg>
  );
}

/* ===== Option 4: Bold N — stencil-cut, modern & dimensional ===== */
function BoldN({ size = 200 }) {
  return (
    <svg width={size} height={size} viewBox="0 0 100 100" fill="none">
      <Gradients id="bn"/>
      {/* background pill */}
      <rect x="6" y="6" width="88" height="88" rx="14" fill="url(#bn-grad)"/>
      {/* subtle inner highlight */}
      <rect x="6" y="6" width="88" height="44" rx="14" fill="url(#bn-grad2)" opacity=".18"/>
      {/* The N — bold, stenciled letters with diagonal */}
      <g fill="#15161E">
        <rect x="24" y="20" width="14" height="60" rx="2"/>
        <rect x="62" y="20" width="14" height="60" rx="2"/>
        {/* diagonal */}
        <path d="M38 20 L40 20 L76 80 L74 80 L38 28 Z" fill="#15161E"/>
        <polygon points="38,20 52,20 76,80 62,80"/>
      </g>
      {/* tiny up-arrow accent on top-right of N */}
      <g stroke="#15161E" strokeWidth="2.4" strokeLinecap="round" fill="none">
        <path d="M80 30 L86 24"/>
        <path d="M82 24 L86 24 L86 28"/>
      </g>
    </svg>
  );
}

/* ===== Option 5: Wordmark only — geometric custom letters ===== */
function Wordmark({ size = 200 }) {
  return (
    <svg width={size * 2.4} height={size * 0.6} viewBox="0 0 480 120" fill="none">
      <Gradients id="wm"/>
      <text x="0" y="86" fontFamily="'Space Grotesk', sans-serif"
            fontSize="84" fontWeight="700" letterSpacing="-0.04em" fill="#F8F8F2">
        Neo
      </text>
      <text x="155" y="86" fontFamily="'Space Grotesk', sans-serif"
            fontSize="84" fontWeight="700" letterSpacing="-0.04em" fill="url(#wm-grad)">
        Vertex
      </text>
      {/* underline accent peak */}
      <path d="M0 100 L160 100 L168 92 L176 100 L480 100" stroke="url(#wm-grad)" strokeWidth="2" fill="none"/>
    </svg>
  );
}

/* ===== Option 6: Glyph + wordmark lockup — most complete brand ===== */
function Lockup({ size = 200 }) {
  return (
    <svg width={size * 2.4} height={size * 0.7} viewBox="0 0 480 140" fill="none">
      <Gradients id="lu"/>
      {/* mark */}
      <g transform="translate(10, 20)">
        <rect width="100" height="100" rx="22" fill="url(#lu-grad)"/>
        <g fill="#15161E">
          <path d="M28 76 L28 24 L36 24 L36 60 Z"/>
          <path d="M64 76 L64 40 L72 40 L72 76 Z"/>
          <path d="M36 24 L72 76 L64 76 L34 32 Z"/>
          <path d="M50 32 L56 22 L62 32 Z" opacity=".85"/>
        </g>
      </g>
      {/* wordmark */}
      <text x="135" y="80" fontFamily="'Space Grotesk', sans-serif"
            fontSize="56" fontWeight="700" letterSpacing="-0.035em" fill="#F8F8F2">
        Neo<tspan fill="url(#lu-grad)">Vertex</tspan>
      </text>
      <text x="137" y="108" fontFamily="'JetBrains Mono', monospace"
            fontSize="11" fontWeight="500" letterSpacing="0.18em" fill="#6272A4">
        REACH YOUR PEAK
      </text>
    </svg>
  );
}

/* ===== Reusable artboard wrapper ===== */
function Stage({ children, label, light, swatches = ['#50FA7B', '#8BE9FD', '#BD93F9'] }) {
  return (
    <div className={`lab ${light ? 'light' : ''}`}>
      {children}
      <div className="nameplate">{label}</div>
      <div className="swatch-row">
        {swatches.map((c, i) => <span key={i} style={{ background: c }}/>)}
      </div>
    </div>
  );
}

/* ===== App ===== */
function App() {
  const { DesignCanvas, DCSection, DCArtboard } = window;

  return (
    <DesignCanvas title="NeoVertex — Logo Studio">
      <DCSection id="marks" title="Marks (square symbols)" subtitle="Versões geométricas usáveis como ícone de app, avatar, favicon">
        <DCArtboard id="mark-peak" label="01 · Peak Monogram" width={320} height={320}>
          <Stage label="N + cume integrado">
            <Peak size={240}/>
          </Stage>
        </DCArtboard>
        <DCArtboard id="mark-vertex" label="02 · Vertex Trio" width={320} height={320}>
          <Stage label="3 triângulos concêntricos">
            <Vertex size={240}/>
          </Stage>
        </DCArtboard>
        <DCArtboard id="mark-topo" label="03 · Topo Contours" width={320} height={320}>
          <Stage label="Curvas topográficas de montanha">
            <Topo size={240}/>
          </Stage>
        </DCArtboard>
        <DCArtboard id="mark-boldn" label="04 · Bold N" width={320} height={320}>
          <Stage label="N stencil + seta sutil">
            <BoldN size={240}/>
          </Stage>
        </DCArtboard>
      </DCSection>

      <DCSection id="wordmarks" title="Wordmarks & lockups" subtitle="Versões horizontais para nav, header, assinatura">
        <DCArtboard id="word-only" label="05 · Wordmark puro" width={640} height={240}>
          <Stage label="Texto com acento de cume">
            <Wordmark size={200}/>
          </Stage>
        </DCArtboard>
        <DCArtboard id="lockup-full" label="06 · Lockup completo" width={640} height={240}>
          <Stage label="Mark + wordmark + tagline">
            <Lockup size={200}/>
          </Stage>
        </DCArtboard>
      </DCSection>

      <DCSection id="contexts" title="Em contexto" subtitle="Como cada marca se comporta em diferentes superfícies">
        <DCArtboard id="ctx-card" label="App icon · Peak" width={320} height={320}>
          <div style={{ width: '100%', height: '100%', display: 'grid', placeItems: 'center', background: 'linear-gradient(135deg, #1E1F29, #2A2D3E)', borderRadius: 16 }}>
            <div style={{ width: 132, height: 132, borderRadius: 30, overflow: 'hidden', boxShadow: '0 20px 50px -20px rgba(189,147,249,.5)' }}>
              <Peak size={132}/>
            </div>
          </div>
        </DCArtboard>
        <DCArtboard id="ctx-light" label="Sobre fundo claro · BoldN" width={320} height={320}>
          <Stage light label="Funciona em superfície clara">
            <BoldN size={200}/>
          </Stage>
        </DCArtboard>
        <DCArtboard id="ctx-nav" label="No header do site · Lockup" width={760} height={140}>
          <div style={{ width: '100%', height: '100%', display: 'flex', alignItems: 'center', padding: '0 28px', background: '#1E1F29', borderRadius: 12, borderBottom: '1px solid rgba(248,248,242,0.06)' }}>
            <Lockup size={70}/>
            <div style={{ marginLeft: 'auto', display: 'flex', gap: 22, fontFamily: 'Inter', fontSize: 13, color: 'var(--fg-muted)' }}>
              <span>O que fazemos</span>
              <span>Trabalhos</span>
              <span>Sobre</span>
              <span>Contato</span>
            </div>
          </div>
        </DCArtboard>
        <DCArtboard id="ctx-favicon" label="Favicons (16/32/48)" width={520} height={160}>
          <div style={{ width: '100%', height: '100%', display: 'flex', alignItems: 'center', justifyContent: 'space-around', background: '#282A36', borderRadius: 12 }}>
            <div style={{ display: 'grid', gap: 10, justifyItems: 'center' }}>
              <Peak size={16}/>
              <span style={{ fontFamily: 'JetBrains Mono', fontSize: 10, color: 'var(--comment)' }}>16px</span>
            </div>
            <div style={{ display: 'grid', gap: 10, justifyItems: 'center' }}>
              <Peak size={32}/>
              <span style={{ fontFamily: 'JetBrains Mono', fontSize: 10, color: 'var(--comment)' }}>32px</span>
            </div>
            <div style={{ display: 'grid', gap: 10, justifyItems: 'center' }}>
              <Peak size={48}/>
              <span style={{ fontFamily: 'JetBrains Mono', fontSize: 10, color: 'var(--comment)' }}>48px</span>
            </div>
            <div style={{ display: 'grid', gap: 10, justifyItems: 'center' }}>
              <Vertex size={48}/>
              <span style={{ fontFamily: 'JetBrains Mono', fontSize: 10, color: 'var(--comment)' }}>Vertex 48px</span>
            </div>
          </div>
        </DCArtboard>
      </DCSection>
    </DesignCanvas>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
